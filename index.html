<!doctype html><html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/><meta name="theme-color" content="#111111"/><title>악기 연습 로그</title><link rel="manifest" href="manifest.json"/><link rel="apple-touch-icon" href="icon-192.png"/><link rel="stylesheet" href="style.css"/></head><body>
<main class="app">
<header class="app-header"><button id="backBtn" class="back-btn hidden" type="button">‹</button><div><h1 id="pageTitle">연습 리스트</h1><p id="pageDesc">진행 예정 연습과 완료된 연습을 관리해요.</p></div><button id="categoryManageBtn" class="header-btn hidden" type="button">관리</button></header>
<section id="pageList" class="page active"><div class="segmented"><button id="todoTab" type="button" class="active">진행 예정</button><button id="doneTab" type="button">완료</button></div><div class="filter-card"><label for="categoryFilter">카테고리</label><select id="categoryFilter"></select></div><div id="practiceList" class="card-list"></div></section>
<section id="pageAdd" class="page"><div class="panel"><h2 id="practiceFormTitle">연습 신규 등록</h2><input type="hidden" id="editingPracticeId"/><label for="practiceCategory">카테고리</label><select id="practiceCategory"></select><button id="goCategoryFromAdd" type="button" class="text-button">+ 카테고리 추가/관리</button><label for="practiceTitle">연습 제목</label><input id="practiceTitle" maxlength="100" placeholder="예: 3악장 빠른패시지 연습"/><label for="practiceGoal">연습 목표</label><textarea id="practiceGoal" maxlength="1000" placeholder="예: 템포 100까지 안정적으로 올리기"></textarea><button id="savePracticeBtn" type="button" class="btn primary">등록</button><button id="cancelPracticeEditBtn" type="button" class="btn secondary hidden">취소</button></div></section>
<section id="pageStats" class="page"><div class="kpi-grid"><div class="kpi-card"><span>누적 연습 시간</span><strong id="totalMinutes">0분</strong></div><div class="kpi-card"><span>최근 30일 연습시간</span><strong id="last30Minutes">0분</strong></div></div><section class="chart-panel"><h2>최근 일주일 연습시간</h2><div class="axis-label">시간 (분)</div><div id="weeklyChart" class="weekly-chart"></div></section><section class="chart-panel"><h2>카테고리별 누적 연습 시간</h2><div id="categoryStats" class="category-bars"></div></section></section>
<section id="pageCategory" class="page"><div class="panel"><h2>카테고리 관리</h2><input type="hidden" id="editingCategoryId"/><label for="categoryName">카테고리명</label><input id="categoryName" maxlength="50" placeholder="예: 차이코프스키 5번"/><label for="categoryColor">색상</label><select id="categoryColor"><option value="#E7EDFF">파랑</option><option value="#E7F6EC">초록</option><option value="#FFF2DD">주황</option><option value="#FFE8F0">분홍</option><option value="#F0E8FF">보라</option></select><button id="saveCategoryBtn" type="button" class="btn primary">카테고리 등록</button><button id="cancelCategoryEditBtn" type="button" class="btn secondary hidden">취소</button><div id="categoryList" class="category-list"></div></div></section>
</main>
<nav class="bottom-nav"><button id="navList" class="active" type="button">목록</button><button id="navAdd" class="plus" type="button">＋</button><button id="navStats" type="button">통계</button></nav>
<div id="detailModal" class="modal hidden"><div class="modal-sheet"><button class="close-btn" data-close="detailModal" type="button">×</button><div id="detailContent"></div></div></div>
<div id="completeConfirmModal" class="modal hidden"><div class="modal-sheet small"><h2>연습을 완료할까요?</h2><p class="modal-desc">완료 정보를 입력하면 완료된 연습으로 이동해요.</p><div class="button-row"><button type="button" class="btn secondary no-margin" data-close="completeConfirmModal">취소</button><button id="openCompleteFormBtn" type="button" class="btn primary no-margin">완료하기</button></div></div></div>
<div id="completeFormModal" class="modal hidden"><div class="modal-sheet"><button class="close-btn" data-close="completeFormModal" type="button">×</button><h2>연습 결과 기록</h2><label for="completeDate">완료일</label><input id="completeDate" type="date"/><label for="completeMinutes">소요시간</label><input id="completeMinutes" type="number" min="1" max="999" inputmode="numeric" placeholder="분 단위"/><label>만족도</label><div id="ratingStars" class="rating"><button type="button" data-rating="1">★</button><button type="button" data-rating="2">★</button><button type="button" data-rating="3">★</button><button type="button" data-rating="4">★</button><button type="button" data-rating="5">★</button></div><label for="completeMethod">연습 방법</label><select id="completeMethod"><option value="">선택 안 함</option><option>부분 반복</option><option>느린 템포</option><option>메트로놈</option><option>부점/리듬 변형</option><option>보잉 연습</option><option>합주 복습</option><option>기타</option></select><label for="completeReview">연습 결과</label><textarea id="completeReview" maxlength="2000" placeholder="오늘 연습 결과를 기록해요."></textarea><label for="completeNextPlan">다음 연습 계획</label><textarea id="completeNextPlan" maxlength="2000" placeholder="다음에 이어서 할 내용을 적어두세요."></textarea><button id="saveCompleteBtn" type="button" class="btn primary">완료 정보 저장</button></div></div>
<div id="finalConfirmModal" class="modal hidden"><div class="modal-sheet small"><h2>완료 정보를 등록할까요?</h2><p class="modal-desc">등록하면 완료된 연습 목록으로 이동해요.</p><div class="button-row"><button type="button" class="btn secondary no-margin" data-close="finalConfirmModal">취소</button><button id="finalCompleteBtn" type="button" class="btn primary no-margin">등록</button></div></div></div>
<div id="deleteConfirmModal" class="modal hidden"><div class="modal-sheet small"><h2 id="deleteTitle">삭제할까요?</h2><p id="deleteDesc" class="modal-desc">삭제한 데이터는 복구할 수 없어요.</p><div class="button-row"><button type="button" class="btn secondary no-margin" data-close="deleteConfirmModal">취소</button><button id="confirmDeleteBtn" type="button" class="btn danger no-margin">삭제</button></div></div></div>
<script src="app.js"></script></body></html>
